name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same ref when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Node 20 is the minimum per package.json engines; 22 is current LTS.
        node: ['20', '22']
        os: [ubuntu-latest, macos-latest]
        exclude:
          # Keep the matrix tractable: don't run every OS x node combo on every push.
          - os: macos-latest
            node: '20'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        # better-sqlite3 + tree-sitter ship prebuilt binaries; --ignore-scripts fallback would
        # skip native builds, so we run scripts normally and allow them.
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test (unit + integration)
        env:
          # Integration tests spawn dist/cli.js, so they need the build from the step above.
          CI: 'true'
        run: npm test

      - name: Upload dist artifact
        if: matrix.node == '22' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
