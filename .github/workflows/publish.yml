name: Publish

# Publish to npm when a version tag is pushed (e.g. v0.1.0).
# Requires NPM_TOKEN in the repo secrets.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Tags are created deliberately, so we auto-publish without a manual gate.
    permissions:
      contents: read
      id-token: write # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Verify (lint + typecheck + build + test)
        run: |
          npm run lint
          npm run typecheck
          npm run build
          npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
